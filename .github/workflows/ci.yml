name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional Playwright e2e job"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify lockfile is committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required for deterministic CI builds. Commit the lockfile and re-run."
            exit 1
          fi

      - name: NPM registry diagnostics
        run: |
          set -euo pipefail
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Configured npm registry: $(npm config get registry)"

          if [ -f .npmrc ]; then
            echo "Found .npmrc (auth lines masked):"
            awk '
              /^[[:space:]]*($|#|;)/ { print; next }
              /(_authToken|_password|username|email|always-auth|authToken|_auth)[[:space:]]*=/ { print "*** auth config redacted ***"; next }
              { print }
            ' .npmrc
          else
            echo "No repo .npmrc found."
          fi

          echo "Running npm ping against public registry..."
          npm ping --registry=https://registry.npmjs.org/

      - name: Configure deterministic npm registry
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          TARGET_REGISTRY="https://registry.npmjs.org/"
          if [ -f .npmrc ]; then
            REPO_REGISTRY="$(awk -F= '/^[[:space:]]*registry[[:space:]]*=/{print $2}' .npmrc | tail -n1 | tr -d '[:space:]')"
            if [ -n "$REPO_REGISTRY" ]; then
              TARGET_REGISTRY="$REPO_REGISTRY"
            fi
          fi

          if [ "$TARGET_REGISTRY" != "https://registry.npmjs.org/" ]; then
            echo "Private/non-default registry detected via .npmrc: $TARGET_REGISTRY"
            if [ -z "${NPM_TOKEN:-}" ]; then
              echo "::error::NPM_TOKEN is required for private registry access in CI."
              exit 1
            fi
          else
            echo "Using deterministic public npm registry: $TARGET_REGISTRY"
          fi

          npm config set registry "$TARGET_REGISTRY"
          npm config set fund false
          npm config set audit false

          echo "Effective npm registry after configuration: $(npm config get registry)"

      - name: Install dependencies (retry once on transient failure)
        run: |
          set -euo pipefail
          echo "npm ci attempt 1 of 2"
          if npm ci; then
            exit 0
          fi
          echo "npm ci attempt 1 failed; retrying once after short delay..."
          sleep 5
          echo "npm ci attempt 2 of 2"
          npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: E2E status
        run: echo "Playwright e2e is optional and skipped by default in CI."

  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e == true }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/e2e/package-lock.json

      - name: Verify lockfiles are committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required for deterministic CI builds. Commit the lockfile and re-run."
            exit 1
          fi
          if [ ! -f tests/e2e/package-lock.json ]; then
            echo "::error::tests/e2e/package-lock.json is required for deterministic e2e installs. Commit the lockfile and re-run."
            exit 1
          fi

      - name: Configure deterministic npm registry for e2e
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          TARGET_REGISTRY="https://registry.npmjs.org/"
          if [ -f .npmrc ]; then
            REPO_REGISTRY="$(awk -F= '/^[[:space:]]*registry[[:space:]]*=/{print $2}' .npmrc | tail -n1 | tr -d '[:space:]')"
            if [ -n "$REPO_REGISTRY" ]; then
              TARGET_REGISTRY="$REPO_REGISTRY"
            fi
          fi

          if [ "$TARGET_REGISTRY" != "https://registry.npmjs.org/" ] && [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is required for private registry access in CI."
            exit 1
          fi

          npm config set registry "$TARGET_REGISTRY"
          npm config set fund false
          npm config set audit false

      - name: Install app dependencies
        run: npm ci

      - name: Install e2e dependencies
        id: e2e_deps
        continue-on-error: true
        run: npm --prefix tests/e2e ci

      - name: Install Playwright browsers (optional job)
        id: e2e_browsers
        if: ${{ steps.e2e_deps.outcome == 'success' }}
        continue-on-error: true
        run: npm --prefix tests/e2e exec playwright install --with-deps

      - name: Build app
        run: npm run build

      - name: Run e2e tests
        if: ${{ steps.e2e_deps.outcome == 'success' && steps.e2e_browsers.outcome == 'success' }}
        run: npm run test:e2e

      - name: Skip e2e on Playwright install restrictions
        if: ${{ steps.e2e_deps.outcome != 'success' || steps.e2e_browsers.outcome != 'success' }}
        run: echo "Playwright install blocked or unavailable; skipping e2e run."

  e2e-skipped:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_e2e == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: E2E skipped
        run: echo "Playwright e2e job skipped. Trigger workflow_dispatch with run_e2e=true to run it."
