name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional Playwright e2e job"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify lockfile is committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required for deterministic CI builds. Commit the lockfile and re-run."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: E2E status
        run: echo "Playwright e2e is optional and skipped by default in CI."

  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e == true }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/e2e/package-lock.json

      - name: Verify lockfiles are committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required for deterministic CI builds. Commit the lockfile and re-run."
            exit 1
          fi
          if [ ! -f tests/e2e/package-lock.json ]; then
            echo "::error::tests/e2e/package-lock.json is required for deterministic e2e installs. Commit the lockfile and re-run."
            exit 1
          fi

      - name: Install app dependencies
        run: npm ci

      - name: Install e2e dependencies
        id: e2e_deps
        continue-on-error: true
        run: npm --prefix tests/e2e ci

      - name: Install Playwright browsers (optional job)
        id: e2e_browsers
        if: ${{ steps.e2e_deps.outcome == 'success' }}
        continue-on-error: true
        run: npm --prefix tests/e2e exec playwright install --with-deps

      - name: Build app
        run: npm run build

      - name: Run e2e tests
        if: ${{ steps.e2e_deps.outcome == 'success' && steps.e2e_browsers.outcome == 'success' }}
        run: npm run test:e2e

      - name: Skip e2e on Playwright install restrictions
        if: ${{ steps.e2e_deps.outcome != 'success' || steps.e2e_browsers.outcome != 'success' }}
        run: echo "Playwright install blocked or unavailable; skipping e2e run."

  e2e-skipped:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_e2e == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: E2E skipped
        run: echo "Playwright e2e job skipped. Trigger workflow_dispatch with run_e2e=true to run it."
