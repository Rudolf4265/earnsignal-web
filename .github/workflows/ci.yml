name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional Playwright e2e job"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify lockfile is committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required for deterministic CI builds. Commit the lockfile and re-run."
            exit 1
          fi

      - name: Configure npm mirror registry
        env:
          NPM_MIRROR_REGISTRY_VAR: ${{ vars.NPM_MIRROR_REGISTRY }}
          NPM_MIRROR_REGISTRY_SECRET: ${{ secrets.NPM_MIRROR_REGISTRY }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_SCOPE: ${{ vars.NPM_SCOPE }}
          NPM_ALWAYS_AUTH: ${{ vars.NPM_ALWAYS_AUTH }}
        run: |
          set -euo pipefail

          NPM_MIRROR_REGISTRY="${NPM_MIRROR_REGISTRY_VAR:-}"
          if [ -z "$NPM_MIRROR_REGISTRY" ]; then
            NPM_MIRROR_REGISTRY="${NPM_MIRROR_REGISTRY_SECRET:-}"
          fi

          if [ -z "$NPM_MIRROR_REGISTRY" ]; then
            echo "::error::NPM_MIRROR_REGISTRY is required in CI because direct access to registry.npmjs.org is blocked. Set it as a repository variable or secret to your mirror URL."
            exit 1
          fi

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is required in CI to authenticate to the npm mirror registry."
            exit 1
          fi

          echo "::add-mask::${NPM_TOKEN}"

          ALWAYS_AUTH_VALUE="${NPM_ALWAYS_AUTH:-true}"
          MIRROR_NO_PROTOCOL="${NPM_MIRROR_REGISTRY#http://}"
          MIRROR_NO_PROTOCOL="${MIRROR_NO_PROTOCOL#https://}"
          MIRROR_HOST_PATH="${MIRROR_NO_PROTOCOL%/}"

          cat > "$GITHUB_WORKSPACE/.npmrc" <<EOF
registry=${NPM_MIRROR_REGISTRY}
always-auth=${ALWAYS_AUTH_VALUE}
EOF

          if [ -n "${NPM_SCOPE:-}" ]; then
            printf '%s\n' "${NPM_SCOPE}:registry=${NPM_MIRROR_REGISTRY}" >> "$GITHUB_WORKSPACE/.npmrc"
          fi

          printf '%s\n' "//${MIRROR_HOST_PATH}/:_authToken=${NPM_TOKEN}" >> "$GITHUB_WORKSPACE/.npmrc"

      - name: Validate generated mirror config
        env:
          NPM_MIRROR_REGISTRY_VAR: ${{ vars.NPM_MIRROR_REGISTRY }}
          NPM_MIRROR_REGISTRY_SECRET: ${{ secrets.NPM_MIRROR_REGISTRY }}
        run: |
          set -euo pipefail

          NPM_MIRROR_REGISTRY="${NPM_MIRROR_REGISTRY_VAR:-}"
          if [ -z "$NPM_MIRROR_REGISTRY" ]; then
            NPM_MIRROR_REGISTRY="${NPM_MIRROR_REGISTRY_SECRET:-}"
          fi

          EFFECTIVE_REGISTRY="$(npm config get registry)"
          EXPECTED_REGISTRY="$NPM_MIRROR_REGISTRY"
          [[ "$EXPECTED_REGISTRY" == */ ]] || EXPECTED_REGISTRY="${EXPECTED_REGISTRY}/"
          [[ "$EFFECTIVE_REGISTRY" == */ ]] || EFFECTIVE_REGISTRY="${EFFECTIVE_REGISTRY}/"

          if [ "$EFFECTIVE_REGISTRY" != "$EXPECTED_REGISTRY" ]; then
            echo "::error::npm registry mismatch. expected=$EXPECTED_REGISTRY actual=$EFFECTIVE_REGISTRY"
            exit 1
          fi

          MIRROR_NO_PROTOCOL="${NPM_MIRROR_REGISTRY#http://}"
          MIRROR_NO_PROTOCOL="${MIRROR_NO_PROTOCOL#https://}"
          MIRROR_HOST_PATH="${MIRROR_NO_PROTOCOL%/}"
          EXPECTED_AUTH_PREFIX="//${MIRROR_HOST_PATH}/"

          AUTH_LINE_PREFIX="$(awk -F':_authToken=' '/:_authToken=/{print $1}' "$GITHUB_WORKSPACE/.npmrc" | tail -n1)"
          if [ "$AUTH_LINE_PREFIX" != "$EXPECTED_AUTH_PREFIX" ]; then
            echo "::error::Generated .npmrc auth host/path mismatch. expected prefix: $EXPECTED_AUTH_PREFIX"
            exit 1
          fi

      - name: NPM diagnostics (safe)
        run: |
          set -euo pipefail
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Configured npm registry: $(npm config get registry)"

          if [ -f "$GITHUB_WORKSPACE/.npmrc" ]; then
            echo "CI .npmrc present at $GITHUB_WORKSPACE/.npmrc (auth lines masked):"
            awk '
              /^[[:space:]]*($|#|;)/ { print; next }
              /(_authToken|_password|username|email|always-auth|authToken|_auth)[[:space:]]*=/ { print "*** auth config redacted ***"; next }
              { print }
            ' "$GITHUB_WORKSPACE/.npmrc"
          else
            echo "::error::Expected CI .npmrc was not created."
            exit 1
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          if npm ci 2>&1 | tee /tmp/npm-ci.log; then
            exit 0
          fi

          if rg -q "E401|E403|401 Unauthorized|403 Forbidden" /tmp/npm-ci.log; then
            echo "::error::npm ci failed with mirror authentication/authorization error (401/403). Verify NPM_TOKEN read access and mirror permissions for the requested packages."
          else
            echo "::error::npm ci failed. See log above for details."
          fi
          exit 1

      - name: Dependency completeness check
        run: |
          set -euo pipefail
          if npm ls --depth=0; then
            exit 0
          fi
          echo "::error::Dependency completeness check failed. Mirror may be missing packages or lockfile integrity may be out of sync. Verify mirror replication and package-lock.json consistency."
          exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: E2E status
        run: echo "Playwright e2e is optional and skipped by default in CI."

  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e == true }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/e2e/package-lock.json

      - name: Verify lockfiles are committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required for deterministic CI builds. Commit the lockfile and re-run."
            exit 1
          fi
          if [ ! -f tests/e2e/package-lock.json ]; then
            echo "::error::tests/e2e/package-lock.json is required for deterministic e2e installs. Commit the lockfile and re-run."
            exit 1
          fi

      - name: Configure npm mirror registry for e2e
        env:
          NPM_MIRROR_REGISTRY_VAR: ${{ vars.NPM_MIRROR_REGISTRY }}
          NPM_MIRROR_REGISTRY_SECRET: ${{ secrets.NPM_MIRROR_REGISTRY }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_SCOPE: ${{ vars.NPM_SCOPE }}
          NPM_ALWAYS_AUTH: ${{ vars.NPM_ALWAYS_AUTH }}
        run: |
          set -euo pipefail

          NPM_MIRROR_REGISTRY="${NPM_MIRROR_REGISTRY_VAR:-}"
          if [ -z "$NPM_MIRROR_REGISTRY" ]; then
            NPM_MIRROR_REGISTRY="${NPM_MIRROR_REGISTRY_SECRET:-}"
          fi

          if [ -z "$NPM_MIRROR_REGISTRY" ]; then
            echo "::error::NPM_MIRROR_REGISTRY is required in CI because direct access to registry.npmjs.org is blocked. Set it as a repository variable or secret to your mirror URL."
            exit 1
          fi

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is required in CI to authenticate to the npm mirror registry."
            exit 1
          fi

          echo "::add-mask::${NPM_TOKEN}"

          ALWAYS_AUTH_VALUE="${NPM_ALWAYS_AUTH:-true}"
          MIRROR_NO_PROTOCOL="${NPM_MIRROR_REGISTRY#http://}"
          MIRROR_NO_PROTOCOL="${MIRROR_NO_PROTOCOL#https://}"
          MIRROR_HOST_PATH="${MIRROR_NO_PROTOCOL%/}"

          cat > "$GITHUB_WORKSPACE/.npmrc" <<EOF
registry=${NPM_MIRROR_REGISTRY}
always-auth=${ALWAYS_AUTH_VALUE}
EOF

          if [ -n "${NPM_SCOPE:-}" ]; then
            printf '%s\n' "${NPM_SCOPE}:registry=${NPM_MIRROR_REGISTRY}" >> "$GITHUB_WORKSPACE/.npmrc"
          fi

          printf '%s\n' "//${MIRROR_HOST_PATH}/:_authToken=${NPM_TOKEN}" >> "$GITHUB_WORKSPACE/.npmrc"

      - name: NPM diagnostics (safe)
        run: |
          set -euo pipefail
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Configured npm registry: $(npm config get registry)"

      - name: Install app dependencies
        run: |
          set -euo pipefail
          if npm ci 2>&1 | tee /tmp/npm-ci-e2e.log; then
            exit 0
          fi

          if rg -q "E401|E403|401 Unauthorized|403 Forbidden" /tmp/npm-ci-e2e.log; then
            echo "::error::npm ci failed with mirror authentication/authorization error (401/403). Verify NPM_TOKEN read access and mirror permissions for the requested packages."
          else
            echo "::error::npm ci failed. See log above for details."
          fi
          exit 1

      - name: Dependency completeness check
        run: |
          set -euo pipefail
          if npm ls --depth=0; then
            exit 0
          fi
          echo "::error::Dependency completeness check failed. Mirror may be missing packages or lockfile integrity may be out of sync. Verify mirror replication and package-lock.json consistency."
          exit 1

      - name: Install e2e dependencies
        id: e2e_deps
        continue-on-error: true
        run: npm --prefix tests/e2e ci

      - name: Install Playwright browsers (optional job)
        id: e2e_browsers
        if: ${{ steps.e2e_deps.outcome == 'success' }}
        continue-on-error: true
        run: npm --prefix tests/e2e exec playwright install --with-deps

      - name: Build app
        run: npm run build

      - name: Run e2e tests
        if: ${{ steps.e2e_deps.outcome == 'success' && steps.e2e_browsers.outcome == 'success' }}
        run: npm run test:e2e

      - name: Skip e2e on Playwright install restrictions
        if: ${{ steps.e2e_deps.outcome != 'success' || steps.e2e_browsers.outcome != 'success' }}
        run: echo "Playwright install blocked or unavailable; skipping e2e run."

  e2e-skipped:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_e2e == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: E2E skipped
        run: echo "Playwright e2e job skipped. Trigger workflow_dispatch with run_e2e=true to run it."
