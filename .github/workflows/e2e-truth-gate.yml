name: e2e-truth-gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  truth-gate:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.E2E_REQUIRED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "1"
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
      E2E_UPLOAD_FIXTURE: ${{ vars.E2E_UPLOAD_FIXTURE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Validate required secrets and configure fixture
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in E2E_BASE_URL E2E_EMAIL E2E_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is required for e2e truth gate."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ -z "${E2E_UPLOAD_FIXTURE:-}" ]; then
            echo "E2E_UPLOAD_FIXTURE=tests/fixtures/patreon_minimal.csv" >> "$GITHUB_ENV"
          fi

      - name: Install E2E dependencies
        run: npm --prefix tests/e2e ci

      - name: Install Playwright browser
        run: npm --prefix tests/e2e exec playwright install --with-deps chromium

      - name: Run truth gate
        run: npm run test:e2e:truth

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: truth-gate-playwright-artifacts
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
          if-no-files-found: warn

  truth-gate-skipped:
    if: ${{ !(github.event_name == 'workflow_dispatch' || vars.E2E_REQUIRED == '1') }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Truth gate skipped. Use workflow_dispatch or set repository variable E2E_REQUIRED=1."
